<!-- Landing/login page: entry point where users sign in before being routed to their group's content -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enceladus Mission Simulator - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="login-container">
        <h1>Enceladus Mission Simulator</h1>
        <p>Enter your team credentials to begin.</p>

        <form id="login-form">
            <label for="username">Login Name</label>
            <input type="text" id="username" autocomplete="off" required>

            <label for="passcode">Passcode</label>
            <input type="password" id="passcode" required>

            <button type="submit">Log In</button>
        </form>

        <p id="error-message" class="error-message"></p>
    </div>

    <script src="js/users.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
